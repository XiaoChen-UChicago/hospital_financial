<body>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${tabName}')"`).classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
        }

        // Helper function to parse CSV-like textarea data
        function parseData(textareaId) {
            const data = document.getElementById(textareaId).value.trim();
            if (!data) return [];
            return data.split('\n').map(row => row.split(','));
        }

        // Function to collect all financial data from the form
        function collectAllFinancialData() {
            const hospitalName = document.getElementById('hospitalName').value;
            const currentMonth = document.getElementById('currentMonth').value;

            return {
                hospitalName: hospitalName,
                reportMonth: currentMonth,
                balanceSheet: parseData('balanceSheet'),
                incomeStatement: parseData('incomeStatement'),
                cashFlow: parseData('cashFlow'),
                equityChange: parseData('equityChange'),
                medicalIncome: parseData('medicalIncome'),
                medicalCost: parseData('medicalCost'),
                expenseDetail: parseData('expenseDetail'),
                assetDetail: parseData('assetDetail'),
                liabilityDetail: parseData('liabilityDetail'),
                operationIndex: parseData('operationIndex')
            };
        }

        async function runFullAnalysis() {
            const hospitalName = document.getElementById('analysisHospitalName').value;
            const startDate = document.getElementById('analysisStartDate').value;
            const endDate = document.getElementById('analysisEndDate').value;

            if (!hospitalName) {
                alert("请先选择一个医院。");
                return;
            }

            try {
                const response = await fetch(`/api/data?hospitalName=${encodeURIComponent(hospitalName)}&startDate=${startDate}&endDate=${endDate}`);
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Failed to fetch data: ${errorText}`);
                }
                const financialData = await response.json();

                // For now, we are not parsing the file content in the frontend.
                // We pass the raw content to the analysis functions.
                // The LLM is expected to understand the CSV-like content.
                const dataForLlm = {
                    hospitalName: hospitalName,
                    reportMonth: endDate, // Use the end date as the primary report month
                    ...financialData
                };

                // Now, run the analyses with the fetched data
                await generateAnalysisResults(dataForLlm);
                await generateComparisonResults(dataForLlm);
                await generateReport(dataForLlm);

            } catch (error) {
                console.error("An error occurred during analysis:", error);
                alert(`分析过程中出现错误: ${error.message}`);
            }
        }

        // Placeholder for actual data parsing and analysis logic
        async function parseAndAnalyze() {
            // This function would typically parse all input data
            // and then call functions to generate analysis results.
            console.log("Parsing data and starting analysis...");
            const allFinancialData = collectAllFinancialData();
            await generateAnalysisResults(allFinancialData);
            await generateComparisonResults(allFinancialData);
            await generateReport(allFinancialData);
            switchTab('analysis'); // Switch to analysis tab after processing
        }

        async function callLLMAPI(promptContent) {
            const LLM_API_ENDPOINT = "/api/llm"; // This now points to our local proxy server

            try {
                const response = await fetch(LLM_API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ promptContent: promptContent })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    let errorMessage = `API request failed: ${response.status}`;
                    try {
                        const errorJson = JSON.parse(errorText);
                        errorMessage += ` - ${errorJson.error.message || errorJson.error || errorText}`;
                    } catch (e) {
                        errorMessage += ` - ${errorText}`;
                    }
                    throw new Error(errorMessage);
                }

                const data = await response.json();
                // The proxy now returns the direct JSON from OpenAI, so we can parse the content
                const content = data.choices[0].message.content;
                let llmResponse;
                try {
                    llmResponse = JSON.parse(content);
                } catch (parseError) {
                    console.error("Failed to parse LLM response content as JSON:", content, parseError);
                    throw new Error("LLM Response JSON Parse Error");
                }
                return llmResponse;

            } catch (error) {
                console.error("Error calling LLM API:", error);
                throw new Error(`LLM API Call Failed: ${error.message}`);
            }
        }

        async function generateAnalysisResults(allFinancialData) {
            const currentAnalysisDiv = document.getElementById('currentAnalysis');
            currentAnalysisDiv.innerHTML = '<div class="loading-spinner"></div><p>正在生成数据分析报告，请稍候...</p>'; // Loading state

            const promptForAnalysis = `
                你是一名资深的中国医院财务分析专家。请根据以下医院的财务数据，出具一份专业的“本月财务指标分析”报告。
                报告应侧重于中国医院财务管理的特点，提供对医院当前财务状况的全面解读。
                报告内容需包括但不限于：
                1. 医院名称和报告月份。

                请严格以JSON格式返回，包含以下字段：
                {

                        <h4>盈利能力分析</h4>

                        <h4>偿债能力分析</h4>

        async function generateComparisonResults(allFinancialData) {
            const monthlyComparisonDiv = document.getElementById('monthlyComparison');
            const yearlyComparisonDiv = document.getElementById('yearlyComparison');
            const horizontalComparisonDiv = document.getElementById('horizontalComparison');

            monthlyComparisonDiv.innerHTML = '<p>正在生成环比分析，请稍候...</p>';
            yearlyComparisonDiv.innerHTML = '<p>正在生成同比分析，请稍候...</p>';
            horizontalComparisonDiv.innerHTML = '<p>正在生成横向对比分析，请稍候...</p>';

            const promptForComparison = `
                你是一名资深的中国医院财务分析专家。请根据以下医院的财务数据，出具一份专业的“对比分析”报告。
                报告应侧重于中国医院财务管理的特点，提供对医院财务状况的全面对比解读。
                报告内容需包括：
                1.  环比分析（与上月对比）：
                    - 至少对比3-5个关键财务指标（如资产负债率、流动比率、净利润、主营业务收入、门诊量等）。
                    - 对每个指标，说明本月、上月数值，以及环比变化（绝对值和百分比）。
                    - 对整体环比变化进行总结和评论。
                2.  同比分析（与去年同期对比）：
                    - 至少对比3-5个关键财务指标（选择与环比分析不同的指标，或从不同角度进行）。
                    - 对每个指标，说明本月、去年同期数值，以及同比增长（绝对值和百分比）。
                    - 对整体同比增长进行总结和评论。
                3.  横向对比分析（与同级医院平均水平对比，假设平均水平如下，你可以根据数据自行调整）：
                    - 至少对比3-5个关键运营或财务指标。
                    - 对每个指标，说明本院数值、假设的同级医院平均值、以及本院与平均水平的对比评级（如“优于平均”、“略低于平均”、“持平”等）。
                    - 对整体横向对比情况进行总结和评论。

                请严格以JSON格式返回，包含以下字段：
                {
                    "monthlyComparison": [
                        {"metric": "string", "thisMonth": "string", "lastMonth": "string", "change": "string", "comment": "string"}
                    ],
                    "yearlyComparison": [
                        {"metric": "string", "thisMonth": "string", "lastMonthYear": "string", "change": "string", "comment": "string"}
                    ],
                    "horizontalComparison": [
                        {"metric": "string", "hospitalValue": "string", "peerAverage": "string", "rating": "string", "comment": "string"}
                    ]
                }
                确保返回的JSON是完整的，并且每个字段的内容都是详细且专业的中文分析文本。
                医院财务数据如下：
                ${JSON.stringify(allFinancialData, null, 2)}
            `;

            try {
                const llmResponse = await callLLMAPI(promptForComparison);

                if (!llmResponse) {
                    throw new Error("LLM returned an empty response.");
                }

                // Render Monthly Comparison
                let monthlyHtml = '<h4>月度关键指标变化</h4><div class="comparison-grid">';
                llmResponse.monthlyComparison.forEach(item => {
                    monthlyHtml += `
                        <div class="comparison-card">
                            <h4>${item.metric}</h4>
                            <div class="metric">
                                <span class="metric-name">本月</span>
                                <span class="metric-value">${item.thisMonth}</span>
                            </div>
                            <div class="metric">
                                <span class="metric-name">上月</span>
                                <span class="metric-value">${item.lastMonth}</span>
                            </div>
                            <div class="metric ${item.change.includes('↑') ? 'change-positive' : (item.change.includes('↓') ? 'change-negative' : '')}">
                                <span class="metric-name">环比变化</span>
                                <span class="metric-value">${item.change}</span>
                            </div>
                            <div class="alert alert-info" style="margin-top: 10px;">
                                <strong>评论:</strong> ${item.comment}
                            </div>
                        </div>
                    `;
                });
                monthlyHtml += '</div>';
                monthlyComparisonDiv.innerHTML = monthlyHtml;


                // Render Yearly Comparison
                let yearlyHtml = '<h4>年度关键指标变化</h4><div class="comparison-grid">';
                llmResponse.yearlyComparison.forEach(item => {
                    yearlyHtml += `
                        <div class="comparison-card">
                            <h4>${item.metric}</h4>
                            <div class="metric">
                                <span class="metric-name">本月</span>
                                <span class="metric-value">${item.thisMonth}</span>
                            </div>
                            <div class="metric">
                                <span class="metric-name">去年同期</span>
                                <span class="metric-value">${item.lastMonthYear}</span>
                            </div>
                            <div class="metric ${item.change.includes('↑') ? 'change-positive' : (item.change.includes('↓') ? 'change-negative' : '')}">
                                <span class="metric-name">同比增长</span>
                                <span class="metric-value">${item.change}</span>
                            </div>
                            <div class="alert alert-success" style="margin-top: 10px;">
                                <strong>评论:</strong> ${item.comment}
                            </div>
                        </div>
                    `;
                });
                yearlyHtml += '</div>';
                yearlyComparisonDiv.innerHTML = yearlyHtml;

                // Render Horizontal Comparison
                let horizontalHtml = '<h4>同级医院平均水平对比</h4><div class="standards-table"><table><thead><tr><th>指标名称</th><th>本院数值</th><th>同级医院平均</th><th>评级</th><th>评论</th></tr></thead><tbody>';
                llmResponse.horizontalComparison.forEach(item => {
                    let ratingClass = '';
                    if (item.rating.includes('优于')) ratingClass = 'range-healthy';
                    else if (item.rating.includes('略低于') || item.rating.includes('风险')) ratingClass = 'range-risk';
                    else if (item.rating.includes('持平')) ratingClass = 'range-normal';

                    horizontalHtml += `
                        <tr>
                            <td>${item.metric}</td>
                            <td>${item.hospitalValue}</td>
                            <td>${item.peerAverage}</td>
                            <td class="${ratingClass}">${item.rating}</td>
                            <td>${item.comment}</td>
                        </tr>
                    `;
                });
                horizontalHtml += '</tbody></table></div>';
                horizontalComparisonDiv.innerHTML = horizontalHtml;

            } catch (error) {
                console.error("生成对比分析报告失败:", error);
                const errorMessage = `<div class="alert alert-danger"><strong>错误:</strong> 生成对比分析报告失败。原因: ${error.message}。请检查API密钥和网络连接，或重试。</div>`;
                monthlyComparisonDiv.innerHTML = errorMessage;
                yearlyComparisonDiv.innerHTML = errorMessage;
                horizontalComparisonDiv.innerHTML = errorMessage;
            }
        }

        async function generateReport(allFinancialData) {
            const analysisReport = document.getElementById('analysisReport');
            analysisReport.innerHTML = '<div class="loading-spinner"></div><p>正在生成最终分析报告，请稍候...</p>'; // Loading state

            const promptForReport = `
                你是一名资深的中国医院财务分析专家。请根据以下医院的财务数据，出具一份专业、全面、深入的“医院财务分析报告”。
                报告应站在医院管理层的角度，提供决策支持，并严格符合中国医院财务管理的特点和要求。
                报告内容需包括但不限于以下几个部分，并确保每个部分都有详细的专业分析：

                1.  **执行摘要 (Executive Summary)**: 简要总结本期医院的整体财务表现、主要亮点、存在问题和关键建议。
                2.  **综合财务表现分析 (Comprehensive Financial Performance Analysis)**:
                    *   **盈利能力**: 结合收入结构、成本费用、利润指标（如净利润率、毛利率），分析医院的盈利能力及构成。
                    *   **偿债能力**: 分析短期（流动比率、速动比率）和长期（资产负债率）偿债能力，评估财务风险。
                    *   **运营效率**: 结合收入周转率、资产周转率、应收账款周转天数、存货周转天数等，分析资产利用效率和运营效率。
                3.  **主要业务指标分析 (Key Operational Indicators Analysis)**:
                    *   结合门诊量、住院量、平均住院日、床位使用率等运营数据，分析业务发展趋势及对财务的影响。
                4.  **成本费用结构分析 (Cost and Expense Structure Analysis)**:
                    *   分析医疗成本、管理费用、销售费用等构成及变化，识别成本控制的关键领域。
                5.  **资金流动性分析 (Cash Flow Analysis)**:
                    *   分析经营活动、投资活动和筹资活动现金流量，评估医院的现金生成能力和资金周转状况。
                6.  **风险评估与预警 (Risk Assessment and Early Warning)**:
                    *   识别潜在的财务风险（如高应收账款风险、资金周转压力、成本失控风险等），并提供预警。
                7.  **战略建议 (Strategic Recommendations)**:
                    *   基于以上分析，为医院未来的财务管理和运营提供具体的、可操作的战略建议和改进措施。

                请严格以JSON格式返回，包含以下字段：
                {
                    "reportTitle": "string",
                    "executiveSummary": "string",
                    "comprehensiveFinancialPerformanceAnalysis": {
                        "profitability": "string",
                        "solvency": "string",
                        "operationalEfficiency": "string"
                    },
                    "keyOperationalIndicatorsAnalysis": "string",
                    "costAndExpenseStructureAnalysis": "string",
                    "cashFlowAnalysis": "string",
                    "riskAssessmentAndEarlyWarning": "string",
                    "strategicRecommendations": "string"
                }
                确保返回的JSON是完整的，并且每个字段的内容都是详细且专业的中文分析文本。
                医院财务数据如下：
                ${JSON.stringify(allFinancialData, null, 2)}
            `;

            try {
                const llmResponse = await callLLMAPI(promptForReport);

                if (!llmResponse) {
                    throw new Error("LLM returned an empty response.");
                }

                analysisReport.innerHTML = `
                    <div class="analysis-card">
                        <h3>${llmResponse.reportTitle}</h3>
                        <h4>执行摘要</h4>
                        <p>${llmResponse.executiveSummary}</p>
                        <h4>综合财务表现分析</h4>
                        <h5>盈利能力</h5>
                        <p>${llmResponse.comprehensiveFinancialPerformanceAnalysis.profitability}</p>
                        <h5>偿债能力</h5>
                        <p>${llmResponse.comprehensiveFinancialPerformanceAnalysis.solvency}</p>
                        <h5>运营效率</h5>
                        <p>${llmResponse.comprehensiveFinancialPerformanceAnalysis.operationalEfficiency}</p>
                        <h4>主要业务指标分析</h4>
                        <p>${llmResponse.keyOperationalIndicatorsAnalysis}</p>
                        <h4>成本费用结构分析</h4>
                        <p>${llmResponse.costAndExpenseStructureAnalysis}</p>
                        <h4>资金流动性分析</h4>
                        <p>${llmResponse.cashFlowAnalysis}</p>
                        <h4>风险评估与预警</h4>
                        <p>${llmResponse.riskAssessmentAndEarlyWarning}</p>
                        <h4>战略建议</h4>
                        <p>${llmResponse.strategicRecommendations}</p>
                    </div>
                `;
            } catch (error) {
                console.error("生成分析报告失败:", error);
                analysisReport.innerHTML = `
                    <div class="alert alert-danger">
                        <strong>错误:</strong> 生成分析报告失败。原因: ${error.message}。请检查API密钥和网络连接，或重试。
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const uploadForm = document.getElementById('uploadForm');
            const uploadStatus = document.getElementById('uploadStatus');

            uploadForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                const formData = new FormData(uploadForm);
                
                uploadStatus.style.display = 'block';
                uploadStatus.style.background = '#d1ecf1';
                uploadStatus.style.color = '#0c5460';
                uploadStatus.innerHTML = '正在上传并处理文件，请稍候...';

                try {
                    const response = await fetch('/api/upload', {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.error || 'Upload failed');
                    }

                    uploadStatus.style.background = '#d4edda';
                    uploadStatus.style.color = '#155724';
                    uploadStatus.innerHTML = `<strong>成功:</strong> ${result.message}`;
                    uploadForm.reset();

                } catch (error) {
                    uploadStatus.style.background = '#f8d7da';
                    uploadStatus.style.color = '#721c24';
                    uploadStatus.innerHTML = `<strong>错误:</strong> ${error.message}`;
                }
            });

            // Function to fetch the list of hospitals and populate the dropdown
            async function populateHospitals() {
                try {
                    const response = await fetch('/api/hospitals');
                    const hospitals = await response.json();
                    const selectElement = document.getElementById('analysisHospitalName');
                    selectElement.innerHTML = ''; // Clear existing options
                    hospitals.forEach(hospital => {
                        const option = document.createElement('option');
                        option.value = hospital;
                        option.textContent = hospital;
                        selectElement.appendChild(option);
                    });
                } catch (error) {
                    console.error("Failed to fetch hospitals:", error);
                }
            }

            // Populate hospitals when the analysis tab is clicked
            document.querySelector('.tab[onclick="switchTab(\'analysis\')"]').addEventListener('click', populateHospitals);

            // Initial population in case the user is already on the tab
            if (document.getElementById('analysis-tab').classList.contains('active')) {
                populateHospitals();
            }

            // Keep the original logic for tab switching
            switchTab('input');
        });
    </script>
